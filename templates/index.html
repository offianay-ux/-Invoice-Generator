<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text: #ffffff;
      --muted: rgba(255,255,255,0.7);
      --hint: rgba(255,255,255,0.45);
      --danger: #ff6b6b;
      --radius: 16px;
      --radius-sm: 10px;
      --glass: rgba(255,255,255,0.13);
      --glass-border: rgba(255,255,255,0.25);
      --glass-hover: rgba(255,255,255,0.18);
      --input-bg: rgba(255,255,255,0.1);
      --input-border: rgba(255,255,255,0.2);
      --input-focus: rgba(255,255,255,0.35);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #6c3fc5 0%, #8b5cf6 25%, #5b7fd4 60%, #38bdf8 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem 5rem;
    }

    /* Floating orbs for depth */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: rgba(139, 92, 246, 0.4);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: rgba(56, 189, 248, 0.35);
      bottom: -80px; right: -80px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .page-header h1 {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }

    .page-header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Liquid glass card */
    .card {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--hint);
      margin-bottom: 1rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .field input,
    .field textarea,
    .field select {
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      background: var(--input-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      appearance: none;
    }

    .field input::placeholder,
    .field textarea::placeholder { color: rgba(255,255,255,0.35); }

    .field select option { background: #5b3fa0; color: #fff; }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--input-focus);
      background: rgba(255,255,255,0.16);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1);
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
      line-height: 1.6;
    }

    .span-2 { grid-column: span 2; }

    hr.divider {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 1rem 0;
    }

    /* Items table */
    .items-table {
      width: 100%;
      border-collapse: collapse;
    }

    .items-table th {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--hint);
      padding: 0 8px 10px;
      text-align: left;
    }

    .items-table th.right { text-align: right; }

    .items-table td {
      padding: 5px 6px;
      vertical-align: middle;
    }

    .items-table td input {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 7px 9px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .items-table td input::placeholder { color: rgba(255,255,255,0.3); }

    .items-table td input:focus {
      border-color: var(--input-focus);
      background: rgba(255,255,255,0.15);
    }

    .amt-cell {
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      text-align: right;
      color: rgba(255,255,255,0.9);
      padding-right: 6px;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
    }

    .remove-btn:hover {
      background: rgba(255,100,100,0.2);
      color: #ff8080;
    }

    .add-row-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: none;
      border: 1px dashed rgba(255,255,255,0.3);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-row-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }

    /* Totals */
    .totals-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 7px;
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--glass-border);
    }

    .totals-row {
      display: flex;
      gap: 2.5rem;
      font-size: 13px;
    }

    .totals-row .lbl { color: var(--muted); }

    .totals-row .val {
      min-width: 90px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      color: #fff;
    }

    .totals-row.grand {
      font-size: 15px;
      font-weight: 600;
      padding-top: 8px;
      border-top: 1px solid var(--glass-border);
      margin-top: 4px;
    }

    /* Meta row (currency + tax) */
    .meta-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-top: 14px;
    }

    .meta-row .field select { width: 110px; }
    .meta-row .field input  { width: 90px; }

    /* Actions */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }

    .btn-download {
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: var(--radius-sm);
      padding: 11px 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: all 0.2s;
    }

    .btn-download:hover {
      background: rgba(255,255,255,0.3);
      box-shadow: 0 6px 28px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.5);
      transform: translateY(-1px);
    }

    .btn-download:active { transform: scale(0.98) translateY(0); }
    .btn-download svg { flex-shrink: 0; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 560px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="page-header">
    <h1>Invoice generator</h1>
    <p>Fill in the details, add your line items, and download a clean PDF invoice.</p>
  </div>

  <!-- Business -->
  <div class="card">
    <div class="card-title">Your business</div>
    <div class="grid-2">
      <div class="field"><label>Business / your name</label><input type="text" id="bizName" placeholder="Anay Designs" /></div>
      <div class="field"><label>Email</label><input type="email" id="bizEmail" placeholder="you@example.com" /></div>
      <div class="field"><label>Phone</label><input type="tel" id="bizPhone" placeholder="+91 98765 43210" /></div>
      <div class="field"><label>Address</label><input type="text" id="bizAddress" placeholder="Delhi, India" /></div>
    </div>
  </div>

  <!-- Client -->
  <div class="card">
    <div class="card-title">Client details</div>
    <div class="grid-2">
      <div class="field"><label>Client name</label><input type="text" id="clientName" placeholder="Client Co." /></div>
      <div class="field"><label>Client email</label><input type="email" id="clientEmail" placeholder="client@example.com" /></div>
      <div class="field span-2"><label>Client address</label><input type="text" id="clientAddress" placeholder="Mumbai, India" /></div>
    </div>
  </div>

  <!-- Invoice info -->
  <div class="card">
    <div class="card-title">Invoice info</div>
    <div class="grid-3">
      <div class="field"><label>Invoice number</label><input type="text" id="invoiceNum" placeholder="INV-001" /></div>
      <div class="field"><label>Issue date</label><input type="date" id="issueDate" /></div>
      <div class="field"><label>Due date</label><input type="date" id="dueDate" /></div>
    </div>
    <div class="meta-row">
      <div class="field">
        <label>Currency</label>
        <select id="currency">
          <option value="INR">INR ₹</option>
          <option value="USD">USD $</option>
          <option value="EUR">EUR €</option>
          <option value="GBP">GBP £</option>
        </select>
      </div>
      <div class="field">
        <label>Tax %</label>
        <input type="number" id="taxRate" value="18" min="0" max="100" />
      </div>
    </div>
  </div>

  <!-- Line items -->
  <div class="card">
    <div class="card-title">Line items</div>
    <table class="items-table">
      <thead>
        <tr>
          <th style="width:42%">Description</th>
          <th style="width:12%">Qty</th>
          <th style="width:20%">Rate</th>
          <th class="right" style="width:18%">Amount</th>
          <th style="width:8%"></th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <button class="add-row-btn" onclick="addRow()">+ Add item</button>

    <div class="totals-wrap">
      <div class="totals-row"><span class="lbl">Subtotal</span><span class="val" id="subtotal">₹0.00</span></div>
      <div class="totals-row"><span class="lbl">Tax (<span id="taxLabel">18</span>%)</span><span class="val" id="taxAmt">₹0.00</span></div>
      <div class="totals-row grand"><span class="lbl">Total</span><span class="val" id="totalAmt">₹0.00</span></div>
    </div>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="card-title">Notes</div>
    <div class="field">
      <textarea id="notes" placeholder="Payment terms, bank account details, thank-you note..."></textarea>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn-ghost" onclick="clearForm()">Clear form</button>
    <button class="btn-download" onclick="downloadInvoice()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v8M8 10 5 7M8 10l3-3M2 13h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Download invoice PDF
    </button>
  </div>

</div>

<div id="toast">PDF downloaded!</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  const { jsPDF } = window.jspdf;
  const symbols = { INR: '₹', USD: '$', EUR: '€', GBP: '£' };
  let rows = [];
  let rowId = 0;

  function sym() { return symbols[document.getElementById('currency').value] || '₹'; }

  function addRow() {
    const id = rowId++;
    rows.push(id);
    const tbody = document.getElementById('itemsBody');
    const tr = document.createElement('tr');
    tr.id = 'row-' + id;
    tr.innerHTML = `
      <td><input type="text" placeholder="Web design service" oninput="calc()" /></td>
      <td><input type="number" value="1" min="1" style="width:58px;text-align:center;" oninput="calc()" /></td>
      <td><input type="number" value="0" min="0" step="0.01" oninput="calc()" /></td>
      <td class="amt-cell" id="amt-${id}">${sym()}0.00</td>
      <td><button class="remove-btn" onclick="removeRow(${id})" title="Remove">&#x2715;</button></td>
    `;
    tbody.appendChild(tr);
    calc();
  }

  function removeRow(id) {
    rows = rows.filter(r => r !== id);
    document.getElementById('row-' + id)?.remove();
    calc();
  }

  function calc() {
    const s = sym();
    let sub = 0;
    rows.forEach(id => {
      const tr = document.getElementById('row-' + id);
      if (!tr) return;
      const inputs = tr.querySelectorAll('input');
      const qty = parseFloat(inputs[1].value) || 0;
      const rate = parseFloat(inputs[2].value) || 0;
      const amt = qty * rate;
      sub += amt;
      document.getElementById('amt-' + id).textContent = s + amt.toFixed(2);
    });
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const tax = sub * taxRate / 100;
    const total = sub + tax;
    document.getElementById('taxLabel').textContent = taxRate;
    document.getElementById('subtotal').textContent = s + sub.toFixed(2);
    document.getElementById('taxAmt').textContent = s + tax.toFixed(2);
    document.getElementById('totalAmt').textContent = s + total.toFixed(2);
  }

  function clearForm() {
    document.querySelectorAll('input[type=text], input[type=email], input[type=tel], textarea').forEach(el => el.value = '');
    rows.forEach(id => document.getElementById('row-' + id)?.remove());
    rows = [];
    rowId = 0;
    calc();
    addRow(); addRow();
  }

  function val(id) { return document.getElementById(id)?.value?.trim() || ''; }

  function downloadInvoice() {
    const doc = new jsPDF({ unit: 'pt', format: 'a4' });
    const pw = doc.internal.pageSize.getWidth();
    const s = sym();
    const currency = val('currency') || 'INR';

    // --- Fonts & helpers ---
    const setFont = (size, style='normal', color=[26,25,23]) => {
      doc.setFontSize(size);
      doc.setFont('helvetica', style);
      doc.setTextColor(...color);
    };

    const line = (y) => {
      doc.setDrawColor(228, 226, 218);
      doc.setLineWidth(0.5);
      doc.line(40, y, pw - 40, y);
    };

    // Background
    doc.setFillColor(245, 244, 240);
    doc.rect(0, 0, pw, 100, 'F');

    // Header
    setFont(22, 'bold');
    doc.text(val('bizName') || 'Invoice', 40, 48);

    setFont(9, 'normal', [107, 104, 96]);
    const bizLines = [val('bizEmail'), val('bizPhone'), val('bizAddress')].filter(Boolean);
    doc.text(bizLines.join('   ·   '), 40, 66);

    // Invoice badge (top right)
    setFont(9, 'normal', [107, 104, 96]);
    doc.text('INVOICE', pw - 40, 40, { align: 'right' });
    setFont(13, 'bold', [26,25,23]);
    doc.text(val('invoiceNum') || 'INV-001', pw - 40, 56, { align: 'right' });
    setFont(9, 'normal', [107,104,96]);
    doc.text(`Issued: ${val('issueDate') || '—'}`, pw - 40, 70, { align: 'right' });
    doc.text(`Due: ${val('dueDate') || '—'}`, pw - 40, 82, { align: 'right' });

    let y = 120;

    // Bill to
    setFont(8, 'bold', [156,154,147]);
    doc.text('BILL TO', 40, y);
    y += 14;
    setFont(12, 'bold', [26,25,23]);
    doc.text(val('clientName') || '—', 40, y);
    y += 14;
    setFont(10, 'normal', [107,104,96]);
    if (val('clientEmail')) { doc.text(val('clientEmail'), 40, y); y += 13; }
    if (val('clientAddress')) { doc.text(val('clientAddress'), 40, y); y += 13; }

    y += 14;
    line(y); y += 20;

    // Table header
    doc.setFillColor(245, 244, 240);
    doc.rect(40, y - 6, pw - 80, 22, 'F');
    setFont(8, 'bold', [107,104,96]);
    doc.text('DESCRIPTION', 48, y + 9);
    doc.text('QTY', pw - 200, y + 9, { align: 'right' });
    doc.text('RATE', pw - 130, y + 9, { align: 'right' });
    doc.text('AMOUNT', pw - 40, y + 9, { align: 'right' });
    y += 28;

    // Items
    let sub = 0;
    rows.forEach((id, i) => {
      const tr = document.getElementById('row-' + id);
      if (!tr) return;
      const inputs = tr.querySelectorAll('input');
      const desc = inputs[0].value || '—';
      const qty = parseFloat(inputs[1].value) || 0;
      const rate = parseFloat(inputs[2].value) || 0;
      const amt = qty * rate;
      sub += amt;

      if (i % 2 === 0) {
        doc.setFillColor(250, 249, 247);
        doc.rect(40, y - 6, pw - 80, 20, 'F');
      }

      setFont(10, 'normal', [26,25,23]);
      doc.text(desc, 48, y + 7);
      setFont(10, 'normal', [107,104,96]);
      doc.text(String(qty), pw - 200, y + 7, { align: 'right' });
      doc.text(s + rate.toFixed(2), pw - 130, y + 7, { align: 'right' });
      setFont(10, 'normal', [26,25,23]);
      doc.text(s + amt.toFixed(2), pw - 40, y + 7, { align: 'right' });
      y += 22;
    });

    y += 8; line(y); y += 18;

    // Totals
    const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
    const tax = sub * taxRate / 100;
    const total = sub + tax;

    const addTotal = (label, amount, bold=false) => {
      setFont(bold ? 11 : 10, bold ? 'bold' : 'normal', bold ? [26,25,23] : [107,104,96]);
      doc.text(label, pw - 200, y);
      setFont(bold ? 11 : 10, bold ? 'bold' : 'normal', [26,25,23]);
      doc.text(s + amount.toFixed(2), pw - 40, y, { align: 'right' });
      y += 18;
    };

    addTotal('Subtotal', sub);
    addTotal(`Tax (${taxRate}%)`, tax);
    y += 2; line(y); y += 16;
    addTotal('Total', total, true);

    // Notes
    const notes = val('notes');
    if (notes) {
      y += 20;
      setFont(8, 'bold', [156,154,147]);
      doc.text('NOTES', 40, y);
      y += 13;
      setFont(10, 'normal', [107,104,96]);
      const noteLines = doc.splitTextToSize(notes, pw - 80);
      doc.text(noteLines, 40, y);
    }

    // Footer
    const pageH = doc.internal.pageSize.getHeight();
    setFont(8, 'normal', [156,154,147]);
    doc.text('Generated with Invoice Generator', pw / 2, pageH - 24, { align: 'center' });

    const filename = `${val('invoiceNum') || 'invoice'}-${val('clientName') || 'client'}.pdf`
      .replace(/[^a-z0-9\-_.]/gi, '_').toLowerCase();
    doc.save(filename);
    showToast('PDF downloaded!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('currency').addEventListener('change', calc);
  document.getElementById('taxRate').addEventListener('input', calc);

  const today = new Date().toISOString().split('T')[0];
  const due = new Date(Date.now() + 15 * 864e5).toISOString().split('T')[0];
  document.getElementById('issueDate').value = today;
  document.getElementById('dueDate').value = due;
  document.getElementById('invoiceNum').value = 'INV-001';

  addRow();
  addRow();
</script>
</body>
</html>
